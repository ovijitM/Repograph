version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Automatic HTTPS Redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt SSL Configuration
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=your-email@example.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik_ssl:/letsencrypt"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: repograph-backend
    restart: unless-stopped
    # No need to expose ports publicly. Only internal proxying is needed.
    expose:
      - "5001"
    environment:
      - PORT=${PORT:-5001}
      - MONGODB_URI=${MONGODB_URI}
      - LLM_PROVIDER=${LLM_PROVIDER:-google}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.5-flash}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-20240620}
      - NODE_ENV=production
    volumes:
      - backend_temp:/app/temp

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: repograph-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Traefik labels route traffic from your domain to the Nginx server on port 80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.repograph.rule=Host(`repograph.yourdomain.com`)"
      - "traefik.http.routers.repograph.entrypoints=websecure"
      - "traefik.http.routers.repograph.tls.certresolver=myresolver"
      - "traefik.http.services.repograph.loadbalancer.server.port=80"

volumes:
  backend_temp:
  traefik_ssl:
