version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: repograph-backend
    restart: unless-stopped
    expose:
      - "5001"
    environment:
      - PORT=${PORT:-5001}
      - MONGODB_URI=${MONGODB_URI}
      - LLM_PROVIDER=${LLM_PROVIDER:-google}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.5-flash}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-20240620}
      - NODE_ENV=production
    volumes:
      - backend_temp:/app/temp
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: repograph-frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.repograph.rule=Host(`${APP_DOMAIN:-repograph.yourdomain.com}`)"
      - "traefik.http.routers.repograph.entrypoints=websecure"
      - "traefik.http.routers.repograph.tls.certresolver=myresolver" # Replace with your existing cert resolver name
      - "traefik.http.services.repograph.loadbalancer.server.port=80"

volumes:
  backend_temp:


